# Tek komutla çalışan dağıtım (Oracle Cloud / herhangi bir Linux sunucu).
# app  : React+Node+SQLite uygulaması (kalıcı /data volume).
# caddy: ters proxy; alan adı verilirse OTOMATİK HTTPS (Let's Encrypt), yoksa :80 (http).
services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - PORT=8080
      - DB_PATH=/data/app.db
      - UPLOADS_DIR=/data/uploads
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - aspava_data:/data

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Sadece IP/http için ":80" bırak. HTTPS için alan adını yaz (örn. aspava.duckdns.org).
      - SITE_ADDRESS=${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  aspava_data:
  caddy_data:
  caddy_config:
