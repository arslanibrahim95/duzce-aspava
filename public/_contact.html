<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<title>Görsel Kontrol</title>
<style>
  body { margin:0; background:#17120f; color:#f7efe8; font-family:Arial, sans-serif; }
  .grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; padding:8px; }
  .cell { background:#221a15; border:1px solid #3a2d24; border-radius:8px; overflow:hidden; }
  .cell img { width:100%; height:120px; object-fit:cover; display:block; background:#000; }
  .cell .lbl { font-size:11px; padding:4px 6px; line-height:1.2; }
  .cell .miss { height:120px; display:flex; align-items:center; justify-content:center; color:#8a7a6e; font-size:11px; background:#1a120d; }
</style>
</head>
<body>
<div class="grid" id="g"></div>
<script>
const items = [
  ['kebap-adana','Adana'],['kebap-urfa','Urfa'],['kebap-beyti','Beyti'],['kebap-patlican','Patlıcanlı'],
  ['kebap-copsis','Çöp Şiş'],['kebap-kuzusis','Kuzu Şiş'],['kebap-cigersis','Ciğer Şiş'],['kebap-tavuksis','Tavuk Şiş'],
  ['kebap-kanat','Kanat'],['kebap-alinazik-kuzu','AliNazik Kuzu'],['kebap-alinazik-dana','AliNazik Dana'],
  ['doner-iskender','İskender'],['doner-simsek-iskender','Şimşek İsk.'],['doner-kebap','Döner Kebap'],
  ['doner-durum','Döner Dürüm'],['doner-durum-beyti-kasar','Dürüm Beyti'],['doner-durum-ssk','Dürüm SSK'],
  ['pide-kiymali','Kıymalı Pide'],['pide-kasarli','Kaşarlı Pide'],['pide-kusbasili','Kuşbaşılı Pide'],['pide-karisik','Karışık Pide'],
  ['pide-kasarli-sucuklu','Sucuklu Pide'],['pide-kiyma-kasarli','Kıyma Kaşar'],['pide-kusbasi-kasarli','Kuşbaşı Kaşar'],
  ['pide-tavuklu','Tavuklu Pide'],['pide-mantarli','Mantarlı Pide'],['pide-kapali-donerli','Kapalı Dönerli'],
  ['kiremit-kofte','Kiremit Köfte'],['kiremit-tavuk','Kiremit Tavuk'],['kiremit-mantarli-kofte','Kiremit Mantarlı'],
  ['icecek-kola','Kola'],['icecek-kola-zero','Zero Kola'],['icecek-fanta','Fanta'],['icecek-sprite','Sprite'],
  ['icecek-ayran','Ayran'],['icecek-fusetea','Fuse Tea'],['icecek-cappy','Cappy'],['icecek-sira','Şıra'],
  ['icecek-salgam','Şalgam'],['icecek-salgam-acili','Acılı Şalgam'],['icecek-limonata','Limonata'],
  ['icecek-soda','Soda'],['icecek-soda-meyveli','Meyveli Soda']
];
const g = document.getElementById('g');
items.forEach(([id,name]) => {
  const c = document.createElement('div'); c.className='cell';
  const img = new Image();
  img.src = 'images/menu/'+id+'.jpg?v='+Date.now();
  img.onerror = () => { c.innerHTML = '<div class="miss">— görsel yok —</div>' + c.querySelector('.lbl').outerHTML; };
  c.appendChild(img);
  const l = document.createElement('div'); l.className='lbl'; l.textContent=name; c.appendChild(l);
  g.appendChild(c);
});
</script>
</body>
</html>
